
services:

  mongodb:
    image: mongo:6
    container_name: taskmanager-db
    ports:
      - "27017:27017"
    volumes:
      -  mongodb_data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: taskmanager-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/taskmanager
      - JWT_SECRET=mysecretekey123
    depends_on:
      - mongodb
    restart: always

  frontend:
    build: ./frontend
    container_name: taskmanager-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
    mongodb_data: